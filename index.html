<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Vault Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
padding:30px;
color:white;

background:
linear-gradient(
rgba(15,23,42,.75),
rgba(15,23,42,.75)
),

url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1920");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

.container{
max-width:950px;
margin:auto;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:30px;

border-radius:25px;

box-shadow:
0 10px 40px rgba(0,0,0,.4);

border:1px solid rgba(255,255,255,.1);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:35px;
}

.stats{
text-align:center;
margin-bottom:20px;
opacity:.8;
font-size:18px;
}

.inputBox{

display:grid;

grid-template-columns:
1fr 2fr auto;

gap:10px;

margin-bottom:20px;
}

input{

padding:14px;

border:none;

outline:none;

border-radius:12px;

background:
rgba(255,255,255,.12);

color:white;
}

input::placeholder{
color:#ddd;
}

button{

border:none;

padding:14px;

border-radius:12px;

cursor:pointer;

font-weight:bold;

transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.addBtn{
background:#22c55e;
color:white;
}

.search{
width:100%;
margin-bottom:25px;
}

.card{

background:
rgba(255,255,255,.08);

padding:20px;

border-radius:20px;

margin-bottom:15px;

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

transition:.3s;
}

.card:hover{

transform:
translateY(-4px);

background:
rgba(255,255,255,.12);

}

.info{
flex:1;
}

.info h3{
margin-bottom:8px;
}

.info a{

color:#60a5fa;

text-decoration:none;

word-break:break-all;
}

.date{

font-size:12px;

opacity:.7;

margin-top:8px;
}

.buttons{

display:flex;

gap:10px;

flex-wrap:wrap;
}

.open{
background:#3b82f6;
color:white;
}

.edit{
background:#f59e0b;
}

.delete{
background:#ef4444;
color:white;
}

.empty{

text-align:center;

opacity:.6;

padding:30px;
}

@media(max-width:700px){

.inputBox{
grid-template-columns:1fr;
}

.card{

flex-direction:column;

align-items:flex-start;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🔗 Link Vault Pro</h1>

<div class="stats">

Total Links:
<span id="total">0</span>

</div>

<div class="inputBox">

<input
id="nameInput"
placeholder="Link name"
>

<input
id="linkInput"
placeholder="Paste link"
>

<button
class="addBtn"
onclick="addLink()"
>

Add

</button>

</div>

<input
class="search"
id="searchInput"
placeholder="Search link..."
onkeyup="renderLinks()"
>

<div id="list"></div>

</div>

<script>

let links=
JSON.parse(
localStorage.getItem("vault")
)||[];


function save(){

localStorage.setItem(
"vault",
JSON.stringify(links)
);

}


function addLink(){

let name=
document
.getElementById(
"nameInput"
)
.value.trim();


let url=
document
.getElementById(
"linkInput"
)
.value.trim();


if(name==""||url==""){

alert(
"Fill all fields"
);

return;
}


if(
!url.startsWith(
"http"
)
){

url=
"https://"+url;

}


let now=
new Date();


links.unshift({

name:name,

url:url,

date:
now.toLocaleDateString()
+
" "
+
now.toLocaleTimeString()

});


save();

document
.getElementById(
"nameInput"
)
.value="";


document
.getElementById(
"linkInput"
)
.value="";


renderLinks();

}


function deleteLink(index){

if(
confirm(
"Delete this link?"
)
){

links.splice(
index,
1
);

save();

renderLinks();

}

}


function editLink(index){

let newName=
prompt(
"Edit name:",
links[index].name
);


if(
newName==null
)return;


let newUrl=
prompt(
"Edit URL:",
links[index].url
);


if(
newUrl==null
)return;


links[index].name=
newName;

links[index].url=
newUrl;

save();

renderLinks();

}


function renderLinks(){

let list=
document
.getElementById(
"list"
);


let search=

document
.getElementById(
"searchInput"
)
.value
.toLowerCase();


list.innerHTML="";


let filtered=

links.filter(

item=>

item.name
.toLowerCase()
.includes(search)

||

item.url
.toLowerCase()
.includes(search)

);


document
.getElementById(
"total"
)
.innerText=
filtered.length;


if(
filtered.length==0
){

list.innerHTML=`

<div class="empty">

No links found 🔍

</div>

`;

return;

}


filtered.forEach(

(item,index)=>{

list.innerHTML+=`

<div class="card">

<div class="info">

<h3>

${item.name}

</h3>

<a
href="${item.url}"
target="_blank"
>

${item.url}

</a>

<div class="date">

📅 Added:
${item.date}

</div>

</div>

<div class="buttons">

<button
class="open"

onclick="
window.open(
'${item.url}'
)
"
>

Open

</button>


<button
class="edit"

onclick="
editLink(
${index}
)
"
>

Edit

</button>


<button
class="delete"

onclick="
deleteLink(
${index}
)
"
>

Delete

</button>

</div>

</div>

`;

});

}

renderLinks();

</script>

</body>
</html>
